const { useState, useEffect, useRef } = React;

// ── Data Export/Import Tab ─────────────────────────────────────────────────
function DataTab() {
  const [status, setStatus] = useState("");
  const importRef = useRef();

  const getAllKeys = () => {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && (k.startsWith("nh_"))) keys.push(k);
    }
    return keys;
  };

  const exportData = () => {
    const data = {};
    getAllKeys().forEach(k => {
      try { data[k] = JSON.parse(localStorage.getItem(k)); }
      catch { data[k] = localStorage.getItem(k); }
    });
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "nutrition-hub-backup-" + new Date().toISOString().split("T")[0] + ".json";
    a.click();
    URL.revokeObjectURL(url);
    setStatus("✓ Exported " + Object.keys(data).length + " keys");
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        let count = 0;
        Object.entries(data).forEach(([k, v]) => {
          localStorage.setItem(k, typeof v === "string" ? v : JSON.stringify(v));
          count++;
        });
        setStatus("✓ Imported " + count + " keys — reload the page to see changes");
      } catch (err) {
        setStatus("✗ Import failed: " + err.message);
      }
    };
    reader.readAsText(file);
  };

  const clearAll = () => {
    if (!window.confirm("Delete ALL Nutrition Hub data? This cannot be undone.")) return;
    getAllKeys().forEach(k => localStorage.removeItem(k));
    setStatus("✓ All data cleared");
  };

  const keys = getAllKeys();
  const logKeys = keys.filter(k => k.startsWith("nh_log_")).sort().reverse();

  const s = {
    card: { background: "linear-gradient(135deg,#0c0c1a,#0a0a16)", border: "1px solid #2a2a48", borderRadius: 14, padding: "16px 18px", marginBottom: 10, boxShadow: "0 4px 24px #00000060" },
    btn: { background: "linear-gradient(135deg,#22d3ee,#06b6d4)", color: "#030310", border: "none", borderRadius: 8, padding: "10px 20px", fontWeight: 700, cursor: "pointer", fontSize: 12, fontFamily: "inherit", boxShadow: "0 0 20px #22d3ee40", letterSpacing: 1, width: "100%", marginBottom: 8 },
    dbtn: { background: "transparent", border: "1px solid #f43f5e40", color: "#f43f5e", borderRadius: 8, padding: "10px 20px", fontWeight: 600, cursor: "pointer", fontSize: 12, fontFamily: "inherit", width: "100%", marginBottom: 8 },
    gbtn: { background: "transparent", border: "1px solid #2a2a48", color: "#7a8a9a", borderRadius: 8, padding: "10px 20px", cursor: "pointer", fontSize: 12, fontFamily: "inherit", width: "100%", marginBottom: 8 },
  };

  return (
    <div style={{ padding: "12px 14px", animation: "fi 0.3s ease", position: "relative", zIndex: 1, fontFamily: "'IBM Plex Mono','Courier New',monospace" }}>
      <div style={s.card}>
        <div style={{ fontSize: 8, letterSpacing: 3, color: "#22d3ee", fontWeight: 600, marginBottom: 12 }}>DATA MANAGEMENT</div>
        <div style={{ fontSize: 9, color: "#8896a6", marginBottom: 16, lineHeight: 1.7 }}>
          {keys.length} stored keys · {logKeys.length} logged days
        </div>

        <button style={s.btn} onClick={exportData}>⬇ Export All Data (JSON)</button>

        <input ref={importRef} type="file" accept=".json" style={{ display: "none" }}
          onChange={importData} />
        <button style={s.gbtn} onClick={() => importRef.current.click()}>⬆ Import Backup (JSON)</button>

        <button style={s.dbtn} onClick={clearAll}>✕ Clear All Data</button>

        {status && (
          <div style={{ fontSize: 10, color: status.startsWith("✓") ? "#22d3ee" : "#f43f5e", padding: "8px 10px", background: "#080812", borderRadius: 6, marginTop: 4 }}>
            {status}
          </div>
        )}
      </div>

      <div style={s.card}>
        <div style={{ fontSize: 8, letterSpacing: 3, color: "#22d3ee", fontWeight: 600, marginBottom: 10 }}>LOGGED DAYS</div>
        {logKeys.length === 0 && <div style={{ fontSize: 10, color: "#8896a6" }}>No days logged yet</div>}
        <div style={{ maxHeight: 300, overflowY: "auto" }}>
          {logKeys.map(k => {
            const date = k.replace("nh_log_", "");
            let entries = [];
            try { entries = JSON.parse(localStorage.getItem(k)) || []; } catch {}
            const kcal = Math.round(entries.reduce((a, e) => a + (e.calories || 0), 0));
            return (
              <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid #1a1a28", alignItems: "center" }}>
                <span style={{ fontSize: 10, color: "#b8c8d8" }}>{date}</span>
                <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                  <span style={{ fontSize: 9, color: "#8896a6" }}>{entries.length} items</span>
                  <span style={{ fontSize: 11, color: "#22d3ee" }}>{kcal} kcal</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={s.card}>
        <div style={{ fontSize: 8, letterSpacing: 3, color: "#22d3ee", fontWeight: 600, marginBottom: 10 }}>SHARE DATA WITH CLAUDE</div>
        <p style={{ fontSize: 10, color: "#8896a6", lineHeight: 1.7, marginBottom: 12 }}>
          Export your data, then upload the JSON file to a Claude conversation. Claude can analyse your trends, suggest meal plans, or help debug the app.
        </p>
        <button style={s.btn} onClick={exportData}>Export for Claude</button>
      </div>
    </div>
  );
}

}).filter(p => p.name.length > 2);

const writeToCache = (items) => {
  const cache = loadCache();
  items.forEach(item => {

    if (k && !cache[k]) {
      const entry = { displayName: item.displayName, source: "ai" };
      Object.keys(N).forEach(nk => { entry[nk] = item[nk] || 0; });
      cache[k] = entry;
    }
  });
  saveCache(cache);
};

// Try to resolve a token (word/phrase) from cache — returns entry or null
const resolveFromCache = (token, cache) => {
  const k = cacheKey(token);
  if (cache[k]) return { ...cache[k], _cacheKey: k };
  // Fuzzy: find any cache key that contains all words of the token
  const words = k.split("_").filter(w => w.length > 2);
  if (!words.length) return null;
  const match = Object.keys(cache).find(ck => words.every(w => ck.includes(w)));
  return match ? { ...cache[match], _cacheKey: match } : null;
};



function CalBalance({ savedWt, consumed }) {
  const tdee = Math.round(66.5 + 13.75 * savedWt + 5.003 * H - 6.75 * 35);
  const rem = tdee - consumed;
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
      <div style={{ background: "#0a0a13", borderRadius: 8, padding: 10, textAlign: "center" }}>
        <div style={{ fontSize: 9, color: "#8896a6" }}>TDEE</div>
        <div style={{ fontSize: 16, color: "#f1f5f9" }}>{tdee}</div>
      </div>
      <div style={{ background: "#0a0a13", borderRadius: 8, padding: 10, textAlign: "center" }}>
        <div style={{ fontSize: 9, color: "#8896a6" }}>REMAINING</div>
        <div style={{ fontSize: 16, color: rem < 0 ? "#f43f5e" : "#22c55e" }}>{rem}</div>
      </div>
    </div>
  );
}

              <div style={{ fontSize: viewDate === today() ? 13 : 12, fontWeight: 600, color: viewDate === today() ? "#e2e8f0" : "#f97316", letterSpacing: 0.3 }}>
                {viewDate === today()
                  ? new Date(viewDate + "T12:00:00").toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" })
                  : (Math.round((new Date(today()) - new Date(viewDate)) / 86400000) === 1
                      ? "Yesterday"
                      : new Date(viewDate + "T12:00:00").toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" }))}
              </div>
              {viewDate !== today() && (
                <div onClick={() => { setViewDate(today()); setLastAdded(null); }}

            <button onClick={() => { if (viewDate >= today()) return; const d = new Date(viewDate); d.setDate(d.getDate() + 1); setViewDate(d.toISOString().split("T")[0]); setLastAdded(null); }}
              style={{ background: "none", border: "1px solid #2a2a48", color: viewDate >= today() ? "#1e1e35" : "#7a8a9a", borderRadius: 6, width: 28, height: 28, cursor: viewDate >= today() ? "default" : "pointer", fontSize: 12, fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center" }}>
              {"›"}
            </button>
          </div>
        </div>

        {/* Big calorie display */}
        <div style={{ padding: "16px 16px 0", display: "flex", alignItems: "flex-end", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: 56, fontWeight: 600, lineHeight: 1, letterSpacing: -2, background: "linear-gradient(135deg,#22d3ee,#06b6d4 50%,#8b5cf6)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text", filter: "drop-shadow(0 0 20px #22d3ee40)" }}>
              {Math.round(totals.calories)}
            </div>
            <div style={{ fontSize: 10, color: "#8896a6", letterSpacing: 2, marginTop: 2 }}>
              KCAL — {pct(totals.calories, "calories")}% OF {N.calories.t}
            </div>
          </div>
          <div style={{ textAlign: "right", paddingBottom: 6 }}>
            <div style={{ fontSize: 9, color: "#8896a6", marginBottom: 6, letterSpacing: 1 }}>{entries.filter(e => !e._water).length} ITEMS</div>
            {/* Mini ring-like remaining indicator */}
            <div style={{ fontSize: 18, fontWeight: 500, color: pct(totals.calories,"calories") > 100 ? "#f43f5e" : "#22c55e" }}>
              {pct(totals.calories,"calories") > 100 ? "+" + (Math.round(totals.calories) - N.calories.t) : (N.calories.t - Math.round(totals.calories))}
            </div>
            <div style={{ fontSize: 8, color: "#8896a6", letterSpacing: 1 }}>{pct(totals.calories,"calories") > 100 ? "OVER" : "LEFT"}</div>
          </div>
        </div>

        {/* Calorie progress bar — full width, thick */}
        <div style={{ margin: "12px 16px 0", height: 6, background: "#0f0f1a", borderRadius: 3, overflow: "hidden" }}>
          <div style={{ height: "100%", width: pct(totals.calories, "calories") + "%", borderRadius: 3, transition: "width 0.6s cubic-bezier(0.34,1.56,0.64,1)", background: pct(totals.calories,"calories") > 100 ? "linear-gradient(90deg,#f43f5e,#f97316)" : "linear-gradient(90deg,#06b6d4,#22d3ee,#8b5cf6)", boxShadow: "0 0 12px #22d3ee60" }} />
        </div>

        {/* Macro row */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 1, margin: "12px 0 0", borderTop: "1px solid #1e1e3540" }}>
          {["protein","carbs","fat","fibre"].map((k, i) => (
            <div key={k} style={{ padding: "10px 14px", borderRight: i < 3 ? "1px solid #1e1e3540" : "none", background: "linear-gradient(180deg,#0c0c1808,transparent)" }}>
              <div style={{ fontSize: 18, fontWeight: 600, color: N[k].c, letterSpacing: -0.5, lineHeight: 1 }}>{Math.round(totals[k])}<span style={{ fontSize: 9, color: N[k].c + "80", marginLeft: 1 }}>g</span></div>
              <div style={{ fontSize: 8, color: "#8896a6", letterSpacing: 1.5, marginTop: 3 }}>{N[k].label.toUpperCase()}</div>
              <div style={{ height: 2, background: "#0f0f1a", borderRadius: 1, overflow: "hidden", marginTop: 5 }}>
                <div style={{ height: "100%", width: pct(totals[k],k) + "%", background: N[k].c, borderRadius: 1, transition: "width 0.5s ease", boxShadow: "0 0 6px " + N[k].c + "80" }} />
              </div>
              <div style={{ fontSize: 8, color: "#8896a6", marginTop: 3 }}>{pct(totals[k],k)}%</div>
            </div>
          ))}
        </div>

        {/* Missed meals banner */}
        {missedPrompt && missedPrompt.length > 0 && (
          <div style={{ margin: "0 12px 0", borderRadius: "0 0 10px 10px", background: "linear-gradient(135deg,#1a0800,#120800)", border: "1px solid #f9731630", borderTop: "none", padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 8, color: "#f97316", letterSpacing: 2, marginBottom: 6 }}>INCOMPLETE DAYS</div>
              {missedPrompt.map(m => (
                <div key={m.dk} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                  <span style={{ fontSize: 10, color: "#b0bec8" }}>{m.label}</span>
                  <span style={{ fontSize: 10, color: m.kcal === 0 ? "#f43f5e" : "#eab308" }}>{m.kcal === 0 ? "nothing logged" : m.kcal + " kcal"}</span>
                  <span onClick={() => { setViewDate(m.dk); setMissedPrompt(null); setLastAdded(null); }}
                    style={{ fontSize: 9, color: "#22d3ee", cursor: "pointer", letterSpacing: 1, borderBottom: "1px solid #22d3ee30" }}>FILL IN</span>
                </div>
              ))}
            </div>
            <button onClick={() => setMissedPrompt(null)} style={{ background: "none", border: "none", color: "#8896a6", cursor: "pointer", fontSize: 18, lineHeight: 1, padding: "0 0 0 8px" }}>×</button>
          </div>
        )}
      </div>

      {tab === "log" && (
        <div style={{ padding: "12px 14px 12px", animation: "fi 0.3s ease", position: "relative", zIndex: 1 }}>

          {lastAdded && (
            <div style={{ ...c.card, borderColor: "#22d3ee80" }}>
              <div style={{ fontSize: 9, color: "#22d3ee", letterSpacing: 2, marginBottom: 8 }}>AFTER ADDING — {lastAdded.name}</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 10 }}>
                {["calories", "protein", "carbs", "fat"].map(k => (
                  <div key={k} style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 15, fontWeight: 600, color: N[k].c }}>{fmt(lastAdded.totals[k], k)}</div>
                    <div style={{ fontSize: 8, color: "#8896a6", marginTop: 1 }}>{N[k].label}</div>
                    <div style={{ fontSize: 8, color: pct(lastAdded.totals[k], k) > 100 ? "#f43f5e" : "#22d3ee" }}>{pct(lastAdded.totals[k], k)}%</div>
                    <Bar val={lastAdded.totals[k]} nkey={k} />
                  </div>
                ))}
              </div>
              <button style={{ ...c.gbtn, width: "100%", fontSize: 10 }} onClick={() => setLastAdded(null)}>Dismiss</button>
            </div>
          )}

          <div style={c.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 9, letterSpacing: 3, color: viewDate === today() ? "#22d3ee" : "#f97316", fontWeight: 600 }}>{viewDate === today() ? "ADD ENTRY" : "BACKFILL ENTRY"}</div>
              <div style={{ display: "flex", gap: 4 }}>
                {[["ai", "✦ AI"], ["search", "Search"], ["custom", "Custom"]].map(([m, lbl]) => (
                  <button key={m} style={{ ...c.pill(mode === m), fontSize: 10, padding: "4px 10px" }} onClick={() => setMode(m)}>{lbl}</button>
                ))}
              </div>
            </div>


            {mode === "ai" && !nlParsed && (
              <div>
                <textarea style={{ ...c.inp, height: 90, resize: "none", marginBottom: 8, lineHeight: 1.6 }}

                  value={nlText} onChange={e => setNlText(e.target.value)} />
                {nlError && <div style={{ fontSize: 10, color: "#f43f5e", marginBottom: 6 }}>{nlError}</div>}
                <button style={{ ...c.btn, width: "100%" }} onClick={parseNL} disabled={nlLoading || !nlText.trim()}>
                  {nlLoading ? "Parsing..." : "Parse and Log"}
                </button>
              </div>
            )}

            {mode === "ai" && nlParsed && (
              <div>
                <div style={{ fontSize: 9, color: "#22d3ee", letterSpacing: 1.5, marginBottom: 8 }}>REVIEW — {nlParsed.length} items</div>

                    <div key={it.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 4px", borderBottom: "1px solid #0d0d16", opacity: it._on ? 1 : 0.35 }}>

                        <div style={{ fontSize: 11, color: "#eef4f8" }}>{it.displayName}</div>
                        <div style={{ fontSize: 9, color: "#8896a6", marginTop: 1 }}>
                          {Math.round(it.calories || 0)} kcal · P{Math.round(it.protein || 0)}g · C{Math.round(it.carbs || 0)}g · F{Math.round(it.fat || 0)}g
                          {(it.water || 0) > 0 ? " · " + it.water + "ml" : ""}
                        </div>
                        <div style={{ fontSize: 8, color: it._fromCache ? "#22c55e60" : "#f9731660" }}>{it._fromCache ? "cached" : "ai"}</div>
                      </div>
                      <button onClick={() => setNlParsed(p => p.map((x, j) => j === i ? { ...x, _on: !x._on } : x))}
                        style={{ fontSize: 10, padding: "3px 9px", borderRadius: 4, border: "none", cursor: "pointer", background: it._on ? "#22d3ee20" : "#f43f5e20", color: it._on ? "#22d3ee" : "#f43f5e" }}>
                        {it._on ? "on" : "off"}
                      </button>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0 8px", fontSize: 11, borderTop: "1px solid #14141e", marginBottom: 8 }}>
                  <span style={{ color: "#8896a6" }}>Total</span>
                  <span style={{ color: "#22d3ee" }}>{Math.round(nlParsed.filter(i => i._on).reduce((a, i) => a + (i.calories || 0), 0))} kcal</span>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button style={{ ...c.btn, flex: 1 }} onClick={confirmNL}>Confirm and Log</button>
                  <button style={c.gbtn} onClick={() => { setNlParsed(null); setNlText(""); }}>Back</button>
                </div>
              </div>
            )}

            {mode === "search" && (
              <div>
                <input style={{ ...c.inp, marginBottom: 6 }} placeholder="Search foods..." value={search}

                {showDrop && search && (
                  <div style={{ background: "#080810", border: "1px solid #2a2a48", borderRadius: 8, maxHeight: 190, overflowY: "auto", marginBottom: 8 }}>

                      <div key={f.id} className="hr" style={{ padding: "9px 12px", cursor: "pointer", borderBottom: "1px solid #0d0d16", background: selFood && selFood.id === f.id ? "#0f0f1a" : "transparent" }}
                        onClick={() => { setSelFood(f); setShowDrop(false); setSearch(f.name); }}>
                        <div style={{ fontSize: 11, color: selFood && selFood.id === f.id ? "#22d3ee" : "#cbd5e1" }}>{f.name}</div>
                        <div style={{ fontSize: 9, color: "#8896a6", marginTop: 2 }}>{f.calories}kcal · P{f.protein}g · C{f.carbs}g · F{f.fat}g</div>
                      </div>
                    ))}
                    {!filtered.length && <div style={{ padding: 10, fontSize: 11, color: "#8896a6" }}>No results</div>}
                  </div>
                )}
                {selFood && (
                  <div style={{ background: "#0f0f1a", borderRadius: 8, padding: 10, marginBottom: 8 }}>
                    <div style={{ fontSize: 11, color: "#22d3ee", marginBottom: 4 }}>{selFood.name}</div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 6 }}>
                      <span style={{ fontSize: 10, color: "#8896a6" }}>Qty:</span>
                      <input type="number" style={{ ...c.inp, width: 80 }} value={qty} min="0.25" step="0.25" onChange={e => setQty(parseFloat(e.target.value) || 1)} />
                    </div>
                  </div>
                )}
                <button style={{ ...c.btn, width: "100%" }} onClick={addFromDB} disabled={!selFood}>Add</button>
              </div>
            )}

            {mode === "custom" && (
              <div>
                <input style={{ ...c.inp, marginBottom: 8 }} placeholder="Food name" value={customName} onChange={e => setCustomName(e.target.value)} />
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, maxHeight: 240, overflowY: "auto", marginBottom: 8 }}>
                  {Object.entries(N).filter(([k]) => k !== "water").map(([k, v]) => (
                    <input key={k} style={{ ...c.inp, fontSize: 10 }} placeholder={v.label + " (" + v.unit + ")"}
                      value={customVals[k] || ""} onChange={e => setCustomVals(p => ({ ...p, [k]: e.target.value }))} />
                  ))}
                </div>
                <button style={{ ...c.btn, width: "100%" }} onClick={addCustom}>Add</button>
              </div>
            )}
          </div>

          <div style={c.card}>
            <div style={{ fontSize: 8, letterSpacing: 3, color: "#38e8ff", fontWeight: 600, marginBottom: 12 }}>DAY SUMMARY</div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
              <span style={{ fontSize: 10, color: "#f97316" }}>Calories</span>
              <span style={{ fontSize: 10, color: "#8896a6" }}>{Math.round(totals.calories)} / {N.calories.t} kcal — {pct(totals.calories, "calories")}%</span>
            </div>
            <Bar val={totals.calories} nkey="calories" h={5} />
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginTop: 12, marginBottom: 12 }}>
              {["protein", "carbs", "fat", "fibre"].map(k => (
                <div key={k} style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: N[k].c }}>{Math.round(totals[k])}<span style={{ fontSize: 8, color: "#8896a6" }}>g</span></div>
                  <div style={{ fontSize: 8, color: "#8896a6" }}>{N[k].label}</div>
                  <Bar val={totals[k]} nkey={k} />
                  <div style={{ fontSize: 8, color: "#8896a6", marginTop: 1 }}>{pct(totals[k], k)}%</div>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderTop: "1px solid #14141e", borderBottom: "1px solid #14141e", marginBottom: 10 }}>
              <div>
                <span style={{ fontSize: 10, color: "#38bdf8" }}>Water  </span>
                <span style={{ fontSize: 10 }}>{totals.water}ml</span>
                <span style={{ fontSize: 9, color: "#8896a6" }}> / {N.water.t}ml ({pct(totals.water, "water")}%)</span>
              </div>
              <div style={{ display: "flex", gap: 5 }}>
                {[250, 500].map(ml => (
                  <button key={ml} onClick={() => addWater(ml)}
                    style={{ fontSize: 9, padding: "3px 8px", borderRadius: 4, border: "1px solid #0ea5e9", color: "#38bdf8", background: "transparent", cursor: "pointer" }}>
                    +{ml}
                  </button>
                ))}
              </div>
            </div>
            <div style={{ fontSize: 9, color: "#8896a6", letterSpacing: 1.5, marginBottom: 6 }}>TOP GAPS</div>
            {Object.entries(N)
              .filter(([k, v]) => v.g !== "hydro" && pct(totals[k], k) < 60)
              .sort((a, b) => pct(totals[a[0]], a[0]) - pct(totals[b[0]], b[0]))
              .slice(0, 5)
              .map(([k, v]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                  <span style={{ fontSize: 10, color: "#8896a6" }}>{v.label}</span>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 60, height: 3, background: "#14141e", borderRadius: 2, overflow: "hidden" }}>
                      <div style={{ width: pct(totals[k], k) + "%", height: "100%", background: pct(totals[k], k) < 25 ? "#f43f5e" : "#eab308", borderRadius: 2 }} />
                    </div>
                    <span style={{ fontSize: 9, color: pct(totals[k], k) < 25 ? "#f87171" : "#facc15", minWidth: 28, textAlign: "right" }}>{pct(totals[k], k)}%</span>
                  </div>
                </div>
              ))}
            <details style={{ marginTop: 8 }}>
              <summary style={{ fontSize: 9, color: "#8896a6", cursor: "pointer", letterSpacing: 1.5, userSelect: "none" }}>FULL BREAKDOWN</summary>
              <div style={{ marginTop: 8, maxHeight: 220, overflowY: "auto" }}>
                {Object.entries(GROUPS).map(([grp, lbl]) => (
                  <div key={grp} style={{ marginBottom: 8 }}>
                    <div style={{ fontSize: 8, color: "#22d3ee", letterSpacing: 2, marginBottom: 4 }}>{lbl.toUpperCase()}</div>
                    {Object.entries(N).filter(([, v]) => v.g === grp).map(([k, v]) => (
                      <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "2px 0" }}>
                        <span style={{ fontSize: 9, color: "#a0b4c4" }}>{v.label}</span>
                        <span style={{ fontSize: 9, color: pct(totals[k], k) >= 100 ? "#22c55e" : pct(totals[k], k) >= 50 ? "#eab308" : "#f43f5e" }}>
                          {fmt(totals[k], k)}{v.unit} ({pct(totals[k], k)}%)
                        </span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </details>
          </div>

          {entries.filter(e => !e._water).length > 0 && (
            <div style={c.card}>
              <div style={{ fontSize: 8, letterSpacing: 3, color: "#38e8ff", fontWeight: 600, marginBottom: 10 }}>LOGGED</div>
              {entries.filter(e => !e._water).map(e => (
                <div key={e.id} className="hr" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 4px", borderBottom: "1px solid #0d0d16", borderRadius: 4 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 11, color: "#eef4f8", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{e.displayName}</div>
                    <div style={{ fontSize: 9, color: "#8896a6", marginTop: 1 }}>P{Math.round(e.protein)}g · C{Math.round(e.carbs)}g · F{Math.round(e.fat)}g</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                    <span style={{ fontSize: 12, color: "#22d3ee" }}>{Math.round(e.calories)}</span>
                    <button onClick={() => removeEntry(e.id)} style={{ background: "none", border: "1px solid #f43f5e30", color: "#f43f5e", borderRadius: 4, cursor: "pointer", fontSize: 11, padding: "2px 7px", fontFamily: "inherit" }}>del</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {tab === "nutrients" && (
        <div style={{ padding: "12px 14px 12px", animation: "fi 0.3s ease", position: "relative", zIndex: 1 }}>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
            {Object.entries(GROUPS).map(([g, lbl]) => (
              <button key={g} style={c.pill(nutGroup === g)} onClick={() => setNutGroup(g)}>{lbl}</button>
            ))}
          </div>
          <div style={c.card}>
            {Object.entries(N).filter(([, v]) => v.g === nutGroup).map(([k, v]) => {
              const val = totals[k] || 0;
              const p = pct(val, k);
              const over = p > 100;
              return (
                <div key={k} style={{ marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 2 }}>
                    <span style={{ fontSize: 11, color: "#b0bec8" }}>{v.label}</span>
                    <span style={{ fontSize: 11 }}>
                      <span style={{ color: over ? "#f43f5e" : p >= 80 ? "#22c55e" : p >= 50 ? "#eab308" : "#b0bec8" }}>{fmt(val, k)}</span>
                      <span style={{ color: "#8896a6" }}> / {v.t}{v.unit}</span>
                      <span style={{ color: "#22d3ee", marginLeft: 6, fontSize: 9 }}>({p}%)</span>
                    </span>
                  </div>
                  <div style={{ height: 4, background: "#14141e", borderRadius: 2, overflow: "hidden" }}>
                    <div style={{ width: p + "%", height: "100%", background: over ? "#f43f5e" : v.c, borderRadius: 2, transition: "width 0.4s" }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab === "inventory" && (
        <div style={{ padding: "12px 14px 12px", animation: "fi 0.3s ease", position: "relative", zIndex: 1 }}>
          <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
            {[["view", "Stock"], ["photo", "Scan"], ["order", "Order"]].map(([t, lbl]) => (
              <button key={t} style={c.pill(invTab === t)} onClick={() => setInvTab(t)}>{lbl}</button>
            ))}
          </div>

          {invTab === "view" && (
            <div style={c.card}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: 8 }}>
                <div style={{ fontSize: 9, color: "#8896a6", letterSpacing: 2 }}>INVENTORY — {inventory.length} items</div>
                <div style={{ fontSize: 9, color: "#8896a6" }}>cache: {Object.keys(loadCache()).length} foods</div>
              </div>
              {Object.keys(CAT).map(cat => {
                const its = inventory.filter(i => (i.category || "pantry") === cat);
                if (!its.length) return null;
                return (
                  <details key={cat} style={{ marginBottom: 6 }} open={cat === "fridge" || cat === "freezer"}>
                    <summary style={{ fontSize: 10, color: "#22d3ee", cursor: "pointer", padding: "6px 0", borderBottom: "1px solid #14141e" }}>
                      {CAT_ICON[cat]} {CAT[cat]} <span style={{ color: "#8896a6" }}>({its.length})</span>
                    </summary>
                    {its.map(item => (
                      <div key={item.id} className="hr" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 4px", borderBottom: "1px solid #0d0d16", borderRadius: 4 }}>
                        <div>
                          <div style={{ fontSize: 11 }}>{item.name}</div>
                          <div style={{ fontSize: 9, color: "#8896a6" }}>{item.qty}</div>
                        </div>
                        <button onClick={() => removeInv(item.id)} style={{ background: "none", border: "none", color: "#8896a6", cursor: "pointer", fontSize: 14 }}>x</button>
                      </div>
                    ))}
                  </details>
                );
              })}
            </div>
          )}

          {invTab === "photo" && (
            <div style={c.card}>
              <div style={{ fontSize: 9, color: "#8896a6", letterSpacing: 2, marginBottom: 10 }}>PHOTO SCAN</div>
              <p style={{ fontSize: 11, color: "#8896a6", marginBottom: 12, lineHeight: 1.7 }}>Upload a photo of your fridge, freezer or cupboard. AI will identify every item and update your inventory.</p>
              <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }}
                onChange={e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => setPhotoB64(ev.target.result.split(",")[1]); r.readAsDataURL(f); }} />
              {!photoB64
                ? <button style={{ ...c.btn, width: "100%" }} onClick={() => fileRef.current.click()}>Take or Upload Photo</button>
                : (
                  <div>
                    <div style={{ fontSize: 11, color: "#22d3ee", marginBottom: 8 }}>Photo ready to analyse</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button style={{ ...c.btn, flex: 1 }} onClick={analysePhoto} disabled={aiLoad}>{aiLoad ? "Analysing..." : "Analyse with AI"}</button>
                      <button style={c.gbtn} onClick={() => setPhotoB64(null)}>Clear</button>
                    </div>
                  </div>
                )}
              {aiMsg && <div style={{ marginTop: 10, fontSize: 11, color: "#22d3ee" }}>{aiMsg}</div>}
            </div>
          )}

          {invTab === "order" && (
            <div style={c.card}>
              <div style={{ fontSize: 9, color: "#8896a6", letterSpacing: 2, marginBottom: 10 }}>TESCO ORDER IMPORT</div>
              {orderStep === "paste" && (
                <div>
                  <p style={{ fontSize: 11, color: "#8896a6", marginBottom: 10, lineHeight: 1.7 }}>Copy your Tesco order items and paste below.</p>
                  <textarea style={{ ...c.inp, height: 160, resize: "vertical", marginBottom: 10 }}
                    placeholder={"2x Tesco Whole Milk 2L\n1x Free Range Eggs 12 pack\nChicken Breast 600g"}
                    value={orderTxt} onChange={e => setOrderTxt(e.target.value)} />
                  <button style={{ ...c.btn, width: "100%" }}
                    onClick={() => { setParsedOrder(parseTesco(orderTxt)); setOrderStep("review"); }}
                    disabled={!orderTxt.trim()}>Parse Order</button>
                </div>
              )}
              {orderStep === "review" && (
                <div>
                  <div style={{ fontSize: 11, color: "#22d3ee", marginBottom: 10 }}>Found {parsedOrder.length} items</div>
                  <div style={{ maxHeight: 260, overflowY: "auto", marginBottom: 10 }}>
                    {parsedOrder.map((item, i) => (
                      <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 4px", borderBottom: "1px solid #0d0d16" }}>
                        <div>
                          <div style={{ fontSize: 11 }}>{item.name}</div>
                          <div style={{ fontSize: 9, color: "#8896a6" }}>qty: {item.qty}{item.price ? " — " + item.price : ""}</div>
                        </div>
                        <button onClick={() => setParsedOrder(p => p.map((x, j) => j === i ? { ...x, include: !x.include } : x))}
                          style={{ fontSize: 9, padding: "3px 8px", borderRadius: 4, border: "none", cursor: "pointer", background: item.include !== false ? "#22d3ee20" : "#f43f5e20", color: item.include !== false ? "#22d3ee" : "#f43f5e" }}>
                          {item.include !== false ? "Add" : "Skip"}
                        </button>
                      </div>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button style={{ ...c.btn, flex: 1 }} onClick={() => {
                      const newItems = parsedOrder.filter(p => p.include !== false).map((p, i) => ({ id: Date.now() + i, name: p.name, qty: "" + p.qty, category: "order", addedAt: new Date().toISOString() }));
                      setInventory(prev => { const ex = prev.map(p => p.name.toLowerCase()); return [...prev, ...newItems.filter(n => !ex.includes(n.name.toLowerCase()))]; });
                      setOrderTxt(""); setParsedOrder([]); setOrderStep("paste"); setInvTab("view");
                    }}>Add to Inventory</button>
                    <button style={c.gbtn} onClick={() => setOrderStep("paste")}>Back</button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {tab === "stats" && (
        <div style={{ padding: "12px 14px 12px", animation: "fi 0.3s ease", position: "relative", zIndex: 1 }}>

          {/* Body stats */}
          <div style={c.card}>
            <div style={{ fontSize: 8, letterSpacing: 3, color: "#22d3ee", fontWeight: 600, marginBottom: 12 }}>BODY STATS — 6ft 2 (188cm)</div>
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              <input style={c.inp} type="number" placeholder="Weight (kg)" value={wtInput} onChange={e => setWtInput(e.target.value)} />
              <button style={c.btn} onClick={() => { const w = parseFloat(wtInput); if (!isNaN(w) && w > 0) { setSavedWt(w); localStorage.setItem(SK.wt, w); setWtInput(""); } }}>Save</button>
            </div>
            {savedWt && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {[
                  { label: "Weight", val: savedWt + "kg", col: "#f1f5f9" },
                  { label: "BMI", val: bmi, sub: parseFloat(bmi) < 18.5 ? "Underweight" : parseFloat(bmi) < 25 ? "Healthy" : parseFloat(bmi) < 30 ? "Overweight" : "Obese", col: parseFloat(bmi) < 25 ? "#22c55e" : parseFloat(bmi) < 30 ? "#facc15" : "#f43f5e" },
                  { label: "TDEE (est.)", val: Math.round(66.5 + 13.75 * savedWt + 5.003 * H - 6.75 * 35) + "kcal", col: "#f1f5f9" },
                  { label: "Ideal range", val: "72-96kg", sub: "for 6ft 2 frame", col: "#8896a6" },
                ].map(({ label, val, sub, col }) => (
                  <div key={label} style={{ background: "#080812", borderRadius: 10, padding: 12, border: "1px solid #1e1e35" }}>
                    <div style={{ fontSize: 8, color: "#8896a6", letterSpacing: 1.5, marginBottom: 5 }}>{label.toUpperCase()}</div>
                    <div style={{ fontSize: 20, fontWeight: 600, color: col, letterSpacing: -0.5 }}>{val}</div>
                    {sub && <div style={{ fontSize: 9, color: col, marginTop: 2 }}>{sub}</div>}
                  </div>
                ))}
              </div>
            )}
            {savedWt && <CalBalance savedWt={savedWt} consumed={Math.round(totals.calories)} />}
          </div>

          {/* Trends & Insights */}
          {avgData && (
              <div style={c.card}>
                <div style={{ fontSize: 8, letterSpacing: 3, color: "#22d3ee", fontWeight: 600, marginBottom: 4 }}>TRENDS & INSIGHTS</div>
                <div style={{ fontSize: 9, color: "#8896a6", marginBottom: 14 }}>based on {avgData.days}-day average · {avgDates.from} to {avgDates.to}</div>

                {insightOvershoots.length > 0 && (
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 8, color: "#f43f5e", letterSpacing: 2, marginBottom: 8 }}>CONSISTENTLY OVER TARGET</div>
                    {insightOvershoots.map(({ k, v, avg, p }) => (
                      <div key={k} style={{ background: "#120608", border: "1px solid #f43f5e30", borderRadius: 10, padding: "12px 14px", marginBottom: 8 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ fontSize: 16 }}>{(fixes[k] || {}).icon || "⚠️"}</span>
                            <div>
                              <div style={{ fontSize: 12, fontWeight: 600, color: "#f43f5e" }}>{v.label}</div>
                              <div style={{ fontSize: 9, color: "#8896a6" }}>avg {k === "calories" ? Math.round(avg) : avg.toFixed(v.p)}{v.unit} — {p}% of target</div>
                            </div>
                          </div>
                          <div style={{ fontSize: 10, fontWeight: 700, color: "#f43f5e", background: "#f43f5e18", borderRadius: 6, padding: "3px 8px" }}>+{p - 100}%</div>
                        </div>
                        <div style={{ height: 3, background: "#0f0f1a", borderRadius: 2, overflow: "hidden", marginBottom: 8 }}>
                          <div style={{ height: "100%", width: "100%", background: "linear-gradient(90deg,#f43f5e,#f97316)", borderRadius: 2, boxShadow: "0 0 8px #f43f5e60" }} />
                        </div>
                        {fixes[k] && <div style={{ fontSize: 10, color: "#b8c8d8", lineHeight: 1.6 }}>{fixes[k].tip}</div>}
                      </div>
                    ))}
                  </div>
                )}

                {insightGaps.length > 0 && (
                  <div>
                    <div style={{ fontSize: 8, color: "#facc15", letterSpacing: 2, marginBottom: 8 }}>CONSISTENT GAPS</div>
                    {insightGaps.map(({ k, v, avg, p }) => {
                      const sev = insSeverity(p);
                      return (
                        <div key={k} style={{ background: "#0a0a13", border: "1px solid " + sev.col + "30", borderRadius: 10, padding: "12px 14px", marginBottom: 8 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <span style={{ fontSize: 16 }}>{(fixes[k] || {}).icon || "📊"}</span>
                              <div>
                                <div style={{ fontSize: 12, fontWeight: 600, color: sev.col }}>{v.label}</div>
                                <div style={{ fontSize: 9, color: "#8896a6" }}>avg {avg < 0.01 ? "0" : avg.toFixed(v.p)}{v.unit} of {v.t}{v.unit} target</div>
                              </div>
                            </div>
                            <div style={{ fontSize: 10, fontWeight: 700, color: sev.col, background: sev.col + "18", borderRadius: 6, padding: "3px 8px", textTransform: "uppercase" }}>{sev.label}</div>
                          </div>
                          <div style={{ height: 3, background: "#0f0f1a", borderRadius: 2, overflow: "hidden", marginBottom: 8 }}>
                            <div style={{ height: "100%", width: p + "%", background: sev.col, borderRadius: 2, boxShadow: "0 0 6px " + sev.col + "60" }} />
                          </div>
                          {fixes[k] && <div style={{ fontSize: 10, color: "#b8c8d8", lineHeight: 1.6 }}>{fixes[k].tip}</div>}
                        </div>
                      );
                    })}
                  </div>
                )}

                {insightGaps.length === 0 && insightOvershoots.length === 0 && (
                  <div style={{ textAlign: "center", padding: "20px 0", color: "#22c55e", fontSize: 12 }}>✓ All nutrients within healthy range for this period</div>
                )}
              </div>
          )}

          {/* Rolling averages */}
          <div style={c.card}>
            <div style={{ fontSize: 8, letterSpacing: 3, color: "#22d3ee", fontWeight: 600, marginBottom: 12 }}>ROLLING AVERAGES</div>

            {/* Range selector */}
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
              {[
                ["7excl", "7d excl. today"],
                ["7incl", "7d incl. today"],
                ["all",   "Since start"],
                ["custom","Custom"],
              ].map(([id, lbl]) => (
                <button key={id} style={{ ...c.pill(avgRange === id), fontSize: 10, padding: "5px 12px" }} onClick={() => setAvgRange(id)}>{lbl}</button>
              ))}
            </div>

            {/* Custom date pickers */}
            {avgRange === "custom" && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
                <div>
                  <div style={{ fontSize: 8, color: "#8896a6", letterSpacing: 1.5, marginBottom: 4 }}>FROM</div>
                  <input type="date" style={{ ...c.inp, fontSize: 11 }} value={avgFrom} max={avgTo} onChange={e => setAvgFrom(e.target.value)} />
                </div>
                <div>
                  <div style={{ fontSize: 8, color: "#8896a6", letterSpacing: 1.5, marginBottom: 4 }}>TO</div>
                  <input type="date" style={{ ...c.inp, fontSize: 11 }} value={avgTo} max={today()} onChange={e => setAvgTo(e.target.value)} />
                </div>
              </div>
            )}

            {/* Date range label */}
            <div style={{ fontSize: 9, color: "#8896a6", marginBottom: 12, padding: "6px 10px", background: "#080812", borderRadius: 6, border: "1px solid #1e1e35" }}>
              {avgDates.from} to {avgDates.to}
              {avgData && <span style={{ color: "#22d3ee", marginLeft: 8 }}>{avgData.days} days with data</span>}
              {!avgData && <span style={{ color: "#f43f5e", marginLeft: 8 }}>no logged days in range</span>}
            </div>

            {avgData && (
              <div>
                {/* Big 4 averages */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 8, marginBottom: 14 }}>
                  {["calories","protein","carbs","fat"].map(k => {
                    const avg = avgData.avg[k];
                    const p = pct(avg, k);
                    const over = p >= 100;
                    return (
                      <div key={k} style={{ background: "#080812", borderRadius: 10, padding: "12px 14px", border: "1px solid #1e1e35" }}>
                        <div style={{ fontSize: 8, color: "#8896a6", letterSpacing: 1.5, marginBottom: 6 }}>{N[k].label.toUpperCase()}</div>
                        <div style={{ fontSize: 24, fontWeight: 600, color: N[k].c, letterSpacing: -1, lineHeight: 1 }}>
                          {k === "calories" ? Math.round(avg) : avg.toFixed(1)}
                          <span style={{ fontSize: 10, color: N[k].c + "80", marginLeft: 2 }}>{N[k].unit}</span>
                        </div>
                        <div style={{ fontSize: 8, color: over ? "#f43f5e" : "#8896a6", marginTop: 4 }}>avg {p}% of target</div>
                        <div style={{ height: 3, background: "#0f0f1a", borderRadius: 2, overflow: "hidden", marginTop: 6 }}>
                          <div style={{ height: "100%", width: p + "%", background: over ? "#f43f5e" : N[k].c, borderRadius: 2, boxShadow: "0 0 6px " + N[k].c + "60" }} />
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Full nutrient averages by group */}
                {Object.entries(GROUPS).map(([grp, grpLbl]) => (
                  <details key={grp} style={{ marginBottom: 6 }}>
                    <summary style={{ fontSize: 9, color: "#22d3ee", cursor: "pointer", padding: "7px 0", borderBottom: "1px solid #1e1e3540", letterSpacing: 1.5, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span>{grpLbl.toUpperCase()}</span>
                      <span style={{ fontSize: 8, color: "#8896a6" }}>avg per day</span>
                    </summary>
                    <div style={{ paddingTop: 8 }}>
                      {Object.entries(N).filter(([, v]) => v.g === grp).map(([k, v]) => {
                        const avg = avgData.avg[k] || 0;
                        const p = pct(avg, k);
                        const col = p >= 100 ? "#f43f5e" : p >= 80 ? "#22c55e" : p >= 50 ? "#facc15" : "#f87171";
                        return (
                          <div key={k} style={{ display: "grid", gridTemplateColumns: "1fr auto 60px", gap: 8, alignItems: "center", padding: "5px 0", borderBottom: "1px solid #0f0f1a" }}>
                            <span style={{ fontSize: 10, color: "#b8c8d8" }}>{v.label}</span>
                            <span style={{ fontSize: 10, color: col, textAlign: "right", minWidth: 70 }}>{avg < 0.01 ? "0" : avg.toFixed(v.p)}{v.unit}</span>
                            <div style={{ position: "relative" }}>
                              <div style={{ height: 3, background: "#0f0f1a", borderRadius: 2, overflow: "hidden" }}>
                                <div style={{ height: "100%", width: p + "%", background: col, borderRadius: 2 }} />
                              </div>
                              <div style={{ fontSize: 7, color: col, textAlign: "right", marginTop: 2 }}>{p}%</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </details>
                ))}
              </div>
            )}
          </div>

        </div>
      )}


      {tab === "data" && (
        <DataTab />
      )}

      <div style={c.tabs}>
        {[["log","◈","LOG"],["nutrients","◉","NUTRIENTS"],["inventory","◫","STOCK"],["stats","◎","STATS"],["data","⬡","DATA"]].map(([id,icon,lbl]) => (
          <div key={id} onClick={() => setTab(id)} className={tab === id ? "tab-active" : ""}
            style={{ flex: 1, padding: "12px 0 10px", textAlign: "center", cursor: "pointer", fontFamily: "inherit", transition: "color 0.2s" }}>
            <div style={{ fontSize: 16, color: tab === id ? "#22d3ee" : "#506070", marginBottom: 2, filter: tab === id ? "drop-shadow(0 0 6px #22d3ee)" : "none", transition: "all 0.2s" }}>{icon}</div>
            <div style={{ fontSize: 8, letterSpacing: 2, color: tab === id ? "#22d3ee" : "#506070", fontWeight: tab === id ? 600 : 400 }}>{lbl}</div>
          </div>
        ))}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
